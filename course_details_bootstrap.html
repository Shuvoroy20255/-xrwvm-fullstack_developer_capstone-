{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ course.name }}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-4">
    <div class="jumbotron">
        <h1 class="display-4">{{ course.name }}</h1>
        <p class="lead">{{ course.description }}</p>
    </div>

    <h2 class="mb-3">Lessons</h2>
    <div class="list-group">
        {% for lesson in course.lesson_set.all %}
        <div class="list-group-item list-group-item-action flex-column align-items-start mb-2">
            <div class="d-flex w-100 justify-content-between">
                <h5 class="mb-1">{{ lesson.title }}</h5>
                <small>Order: {{ lesson.order }}</small>
            </div>
            <p class="mb-1">{{ lesson.content }}</p>
        </div>
        {% empty %}
        <p class="text-muted">No lessons available.</p>
        {% endfor %}
    </div>

    <a href="{% url 'onlinecourse:index' %}" class="btn btn-primary mt-4">Back to Courses</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
